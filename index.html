        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0e17 0%, #141c28 50%, #0a0e17 100%);
            min-height: 100vh;
            color: #c8d4e8;
            overflow-x: hidden;
        }

        /* 标题区 */
        .header {
            background: linear-gradient(90deg, #1a2d4a 0%, #3d6b99 50%, #1a2d4a 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4a90d9;
            box-shadow: 0 4px 30px rgba(74, 144, 217, 0.2);
        }

        .header h1 {
            font-size: 36px;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 20px rgba(74, 144, 217, 0.6);
            letter-spacing: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .datetime {
            font-size: 20px;
            color: #7eb8da;
            font-weight: 500;
        }

        /* 控制栏 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(20, 28, 40, 0.6);
            border-bottom: 1px solid rgba(74, 144, 217, 0.2);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-label {
            color: #8a9cc2;
            font-size: 16px;
        }

        select {
            background: rgba(20, 28, 40, 0.8);
            border: 1px solid rgba(74, 144, 217, 0.4);
            color: #7eb8da;
            padding: 10px 18px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:hover {
            border-color: #7eb8da;
            box-shadow: 0 0 10px rgba(126, 184, 218, 0.3);
        }

        select:focus {
            outline: none;
            border-color: #7eb8da;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #4a90d9, #7eb8da);
            border: none;
            color: #fff;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 217, 0.4);
        }

        /* 主内容区 */
        .main-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 卡片通用样式 */
        .card {
            background: rgba(20, 28, 40, 0.85);
            border: 1px solid rgba(74, 144, 217, 0.3);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.5s ease-out;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            border-color: rgba(74, 144, 217, 0.6);
            box-shadow: 0 8px 32px rgba(74, 144, 217, 0.15);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-title {
            font-size: 16px;
            color: #778da9;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: #7eb8da;
            border-radius: 2px;
        }

        /* 核心指标卡片 */
        .metric-cards {
            grid-column: span 4;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .metric-card {
            text-align: center;
            padding: 25px 15px;
        }

        .metric-value {
            font-size: 56px;
            font-weight: 700;
            color: #7eb8da;
            line-height: 1;
            margin: 12px 0;
            font-family: 'DIN Alternate', sans-serif;
        }

        .metric-value.positive {
            color: #52c41a;
        }

        .metric-value.negative {
            color: #ff6b6b;
        }

        .metric-unit {
            font-size: 14px;
            color: #778da9;
        }

        .metric-trend {
            font-size: 14px;
            margin-top: 8px;
        }

        .trend-up {
            color: #52c41a;
        }

        .trend-down {
            color: #ff6b6b;
        }

        /* 图表容器 */
        .chart-container {
            min-height: 300px;
        }

        /* 月度科室排名 - 左侧大卡 */
        .monthly-dept-card {
            grid-column: span 2;
            grid-row: span 1;
        }

        /* 平台分布 - 右侧大卡 */
        .platform-card {
            grid-column: span 2;
            grid-row: span 1;
        }

        /* 科室同比 */
        .dept-yoy-card {
            grid-column: span 2;
        }

        /* 当月明细 */
        .detail-card {
            grid-column: span 2;
        }

        /* 月度趋势 - 大卡片 */
        .monthly-card {
            grid-column: span 4;
        }

        /* 全年科室排名 - 底部 */
        .yearly-dept-card {
            grid-column: span 4;
        }

        .monthly-chart {
            height: 200px;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            padding: 15px;
            color: #8a9cc2;
            font-size: 12px;
            border-top: 1px solid rgba(74, 144, 217, 0.2);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(20, 28, 40, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(74, 144, 217, 0.4);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #7eb8da;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }

        .loading::after {
            content: '';
            width: 40px;
            height: 40px;
            border: 3px solid #415a77;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: repeat(2, 1fr);
            }
            .metric-cards {
                grid-column: span 2;
            }
            .monthly-card, .articles-card {
                grid-column: span 2;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .metric-cards {
                grid-column: span 1;
                grid-template-columns: repeat(2, 1fr);
            }
            .platform-card, .monthly-dept-card, .dept-yoy-card, .detail-card {
                grid-column: span 1;
                grid-row: span 1;
            }
        }

      "勤务": -1,
      "运行管理室": -17,
      "经营管理室": -5,
      "安全管理室": 0
    }
  }
};
            initCharts();
            updateMetrics();
            updateUpdateTime();
        }

        // 初始化图表
        function initCharts() {
            initPlatformChart();
            initMonthlyDeptChart();
            initYearlyDeptChart();
            initMonthlyChart();
            initDeptYoyChart();
            initDetailChart();
        }

        // 平台分布饼图
        function initPlatformChart() {
            const chart = echarts.init(document.getElementById('platformChart'));
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}: {c}篇 ({d}%)',
                    backgroundColor: '#1e293b',
                    borderColor: '#475569',
                    borderWidth: 2,
                    textStyle: { color: '#f1f5f9', fontSize: 14 }
                },
                series: [{
                    type: 'pie',
                    radius: ['35%', '65%'],
                    center: ['50%', '50%'],
                    avoidLabelOverlap: true,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: 'rgba(20, 28, 40, 0.8)',
                        borderWidth: 3
                    },
                    label: {
                        show: true,
                        formatter: '{b}\n{c}篇 ({d}%)',
                        color: '#e2e8f0',
                        fontSize: 13,
                        lineHeight: 20
                    },
                    emphasis: {
                        label: { show: true, fontSize: 15, fontWeight: 'bold' },
                        itemStyle: {
                            shadowBlur: 30,
                            shadowColor: 'rgba(126, 184, 218, 0.4)'
                        }
                    },
                    data: dashboardData.platform_distribution.platforms.map((name, i) => ({
                        value: dashboardData.platform_distribution.values[i],
                        name: name,
                        itemStyle: {
                            color: ['#7eb8da', '#4a90d9', '#22c55e', '#faad14', '#8c8c8c'][i]
                        }
                    })),
                    animationType: 'scale',
                    animationEasing: 'elasticOut',
                    animationDuration: 1200
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 月度科室稿件排名（当月各科室排名）
        function initMonthlyDeptChart() {
            const chart = echarts.init(document.getElementById('monthlyDeptChart'));
            const year = document.getElementById('yearSelect').value;
            const currentMonthName = document.getElementById('monthSelect').value + '月';
            const deptNames = dashboardData.department_stats.departments;
            const monthlyDepts = dashboardData.monthly_data[year]?.[currentMonthName]?.departments || [];

            const sortedData = deptNames.map((name, i) => ({ name, value: monthlyDepts[i] || 0 }))
                .filter(d => d.name !== '地服部')
                .sort((a, b) => b.value - a.value);

            // 获取同比数据
            const prevYear = parseInt(year) - 1;
            const prevMonthDepts = dashboardData.monthly_data[prevYear]?.[currentMonthName]?.departments || [];
            const prevMap = deptNames.reduce((acc, name, i) => { acc[name] = prevMonthDepts[i] || 0; return acc; }, {});

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    backgroundColor: '#1e293b',
                    borderColor: '#475569',
                    borderWidth: 2,
                    textStyle: { color: '#f1f5f9', fontSize: 14 },
                    formatter: params => {
                        const p = params[0];
                        const prev = prevMap[p.name] || 0;
                        const diff = p.value - prev;
                        const diffColor = diff >= 0 ? '#22c55e' : '#ef4444';
                        const diffText = diff >= 0 ? `+${diff}` : `${diff}`;
                        return `<b>${p.name}</b><br/>当月: <b>${p.value}</b>篇<br/>去年同月: ${prev}篇<br/><span style="color:${diffColor}">同比: ${diffText}</span>`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '10%',
                    bottom: '3%',
                    top: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'value',
                    axisLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.3)' } },
                    axisLabel: { color: '#8a9cc2' },
                    splitLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.15)', type: 'dashed' } }
                },
                yAxis: {
                    type: 'category',
                    data: sortedData.map(d => d.name),
                    axisLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.3)' } },
                    axisLabel: { color: '#c8d4e8', fontSize: 12 },
                    inverse: true
                },
                series: [{
                    type: 'bar',
                    data: sortedData.map((d, i) => {
                        const prev = prevMap[d.name] || 0;
                        const diff = d.value - prev;
                        const barColor = i < 3 ? '#4a90d9' : '#7eb8da';
                        return {
                            value: d.value,
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                                    { offset: 0, color: 'rgba(74, 144, 217, 0.2)' },
                                    { offset: 1, color: barColor }
                                ]),
                                borderRadius: [0, 6, 6, 0]
                            }
                        };
                    }),
                    barWidth: '55%',
                    animationDuration: 1000,
                    animationEasing: 'cubicOut',
                    label: {
                        show: true,
                        position: 'right',
                        formatter: '{c}篇',
                        color: '#e2e8f0',
                        fontSize: 14,
                        fontWeight: '600'
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 全年科室稿件排名
        function initYearlyDeptChart() {
            const chart = echarts.init(document.getElementById('yearlyDeptChart'));
            const sortedData = dashboardData.department_stats.departments
                .map((name, i) => ({ name, value: dashboardData.department_stats.values[i] }))
                .filter(d => d.name !== '地服部')
                .sort((a, b) => b.value - a.value);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    backgroundColor: '#1e293b',
                    borderColor: '#475569',
                    borderWidth: 2,
                    textStyle: { color: '#f1f5f9', fontSize: 14 },
                    formatter: params => {
                        const p = params[0];
                        return `<b>${p.name}</b><br/>全年累计: <b>${p.value}</b>篇`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '8%',
                    bottom: '5%',
                    top: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: sortedData.map(d => d.name),
                    axisLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.3)' } },
                    axisLabel: { color: '#8a9cc2', fontSize: 12, rotate: 0 }
                },
                yAxis: {
                    type: 'value',
                    scale: true,
                    minInterval: 1,
                    axisLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.3)' } },
                    axisLabel: { color: '#8a9cc2' },
                    splitLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.15)', type: 'dashed' } }
                },
                series: [{
                    type: 'bar',
                    data: sortedData.map((d, i) => ({
                        value: d.value,
                        itemStyle: {
                            color: i < 3 ? '#4a90d9' : 'rgba(126, 184, 218, 0.6)',
                            borderRadius: [6, 6, 0, 0]
                        }
                    })),
                    barWidth: '45%',
                    animationDuration: 1000,
                    label: {
                        show: true,
                        position: 'top',
                        formatter: '{c}篇',
                        color: '#e2e8f0',
                        fontSize: 13,
                        fontWeight: '600'
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 月度趋势折线图
        function initMonthlyChart() {
            const chart = echarts.init(document.getElementById('monthlyChart'));
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const data2025 = months.map(m => dashboardData.monthly_data['2025'][m].total);
            const data2026 = months.map(m => dashboardData.monthly_data['2026'][m].total);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(20, 28, 40, 0.95)',
                    borderColor: '#7eb8da',
                    borderWidth: 1,
                    textStyle: { color: '#c8d4e8' }
                },
                legend: {
                    data: ['2025年', '2026年'],
                    textStyle: { color: '#8a9cc2' },
                    top: 0
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: months,
                    axisLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.3)' } },
                    axisLabel: { color: '#8a9cc2' }
                },
                yAxis: {
                    type: 'value',
                    scale: true,
                    minInterval: 1,
                    axisLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.3)' } },
                    axisLabel: { color: '#8a9cc2' },
                    splitLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.2)', type: 'dashed' } }
                },
                series: [
                    {
                        name: '2025年',
                        type: 'line',
                        data: data2025,
                        smooth: true,
                        lineStyle: { color: '#8a9cc2', width: 2, type: 'dashed' },
                        itemStyle: { color: '#8a9cc2' },
                        symbol: 'circle',
                        symbolSize: 6,
                        animationDuration: 1500
                    },
                    {
                        name: '2026年',
                        type: 'line',
                        data: data2026,
                        smooth: true,
                        lineStyle: { color: '#4a90d9', width: 3 },
                        itemStyle: { color: '#4a90d9' },
                        symbol: 'circle',
                        symbolSize: 8,
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(74, 144, 217, 0.25)' },
                                { offset: 1, color: 'rgba(74, 144, 217, 0.02)' }
                            ])
                        },
                        animationDuration: 1500
                    }
                ]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }

        // 科室本月同比图表（显示数量）
        function initDeptYoyChart() {
            const chart = echarts.init(document.getElementById('deptYoyChart')); 
            const currentMonthName = document.getElementById('monthSelect').value + '月';
            const year = document.getElementById('yearSelect').value;
            const prevYear = parseInt(year) - 1;

            // 获取今年和去年当月各科室稿件数
            const currentMonthDeptData = dashboardData.monthly_data[year]?.[currentMonthName]?.departments || [];
            const prevMonthDeptData = dashboardData.monthly_data[prevYear]?.[currentMonthName]?.departments || [];

            // 科室名称列表
            const deptNames = dashboardData.department_stats.departments;

            // 计算各科室同比数量差异
            const deptDiff = deptNames.map((name, i) => {
                const current = currentMonthDeptData[i] || 0;
                const prev = prevMonthDeptData[i] || 0;
                return { name, diff: current - prev, current, prev }; 
            }).filter(d => d.name !== '地服部').sort((a, b) => b.diff - a.diff);

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    backgroundColor: '#1e293b',
                    borderColor: '#475569',
                    borderWidth: 2,
                    textStyle: { color: '#f1f5f9', fontSize: 15 },
                    padding: [12, 16],
                    formatter: params => {
                        const p = params[0];
                        const diff = p.value;
                        const dept = deptDiff.find(d => d.name === p.name);
                        const bgColor = diff >= 0 ? '#22c55e' : '#ef4444';
                        const trendText = diff >= 0 ? '增加' : '减少';
                        return `<div style="font-weight:700;font-size:16px;margin-bottom:10px;color:#f8fafc">${p.name}</div>` +
                               `<div style="background:${bgColor};color:#fff;padding:4px 10px;border-radius:4px;font-weight:600;display:inline-block">${trendText}: ${Math.abs(diff)}篇</div>` +
                               `<div style="margin-top:8px;color:#cbd5e1">今年: <b style="color:#f8fafc">${dept?.current || 0}</b> 篇</div>` +
                               `<div style="color:#cbd5e1">去年: <b style="color:#f8fafc">${dept?.prev || 0}</b> 篇</div>`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '15%',
                    top: '8%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: deptDiff.map(d => d.name),
                    axisLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.3)' } },
                    axisLabel: { color: '#c8d4e8', fontSize: 12, rotate: 25 }
                },
                yAxis: {
                    type: 'value',
                    scale: true,
                    axisLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.3)' } },
                    axisLabel: { color: '#8a9cc2' },
                    splitLine: { lineStyle: { color: 'rgba(74, 144, 217, 0.2)', type: 'dashed' } }
                },
                series: [{
                    type: 'bar',
                    data: deptDiff.map(d => ({
                        value: d.diff,
                        itemStyle: {
                            color: d.diff >= 0 ? '#22c55e' : '#ef4444',
                            borderRadius: d.diff >= 0 ? [4, 4, 0, 0] : [0, 0, 4, 4]
                        }
                    })),
                    barWidth: '50%',
                    animationDuration: 800,
                    label: {
                        show: true,
                        position: d => d.value >= 0 ? 'top' : 'bottom',
                        formatter: p => p.value >= 0 ? `+${p.value}` : `${p.value}`,
                        color: '#ffffff',
                        fontSize: 15,
                        fontWeight: 'bold',
                        distance: 8,
                        textBorderColor: p => p.value >= 0 ? '#22c55e' : '#ef4444',
                        textBorderWidth: 2
                    },
                    markLine: {
                        silent: true,
                        data: [{ yAxis: 0 }],
                        lineStyle: { color: '#64748b', width: 2, type: 'dashed' },
                        label: { show: false }
                    }
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => chart.resize());
        }



        // 更新数据时间
        function updateUpdateTime() {
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', () => {
            initCharts();
            updateUpdateTime();
            // 定时更新时间
            setInterval(updateUpdateTime, 60000);
        });
    </script>
