            display: flex;
            gap: 8px;
        }

            padding: 10px 20px;

            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 144, 217, 0.3);

        .refresh-btn:active {
            transform: translateY(0);

            cursor: not-allowed;

                gridLeft: isMobile ? '3%' : '5%',
                gridRight: isMobile ? '3%' : '5%',
                gridBottom: isMobile ? '10%' : '15%',
                isMobile: isMobile,
                isSmallMobile: isSmallMobile
            };
        }

        // ========== 初始化所有图表 ==========
        function initCharts() {
            try { initPlatformChart(); } catch(e) { console.error('平台分布图错误:', e); }
            try { initMonthlyDeptChart(); } catch(e) { console.error('月度科室排名错误:', e); }
            try { initYearlyDeptChart(); } catch(e) { console.error('全年科室排名错误:', e); }
            try { initMonthlyChart(); } catch(e) { console.error('月度趋势错误:', e); }
            try { initDeptYoyChart(); } catch(e) { console.error('科室同比错误:', e); }
            updateMetrics();
        }

        // ========== 1. 平台分布饼图 ==========
        function initPlatformChart() {
            const chart = echarts.init(document.getElementById('platformChart'));
            const d = dashboardData.platform_distribution;
            const config = getResponsiveConfig();
            const option = {
                tooltip: { trigger: 'item', formatter: '{b}: {c}篇 ({d}%)' },
                legend: { 
                    bottom: 0, 
                    textStyle: { color: '#8a9cc2', fontSize: config.legendFontSize },
                    itemWidth: config.isMobile ? 15 : 25,
                    itemHeight: config.isMobile ? 10 : 14
                },
                series: [{
                    type: 'pie',
                    radius: config.isMobile ? ['35%', '60%'] : ['40%', '65%'],
                    center: ['50%', '45%'],
                    data: d.platforms.map((p, i) => ({ value: d.values[i], name: p })),
                    emphasis: { itemStyle: { shadowBlur: 20, shadowColor: 'rgba(74,144,217,0.5)' } },
                    label: { 
                        color: '#c8d4e8', 
                        fontSize: config.fontSize,
                        formatter: config.isMobile ? '{b}' : '{b}\n{c}篇 ({d}%)'
                    },
                    itemStyle: { borderRadius: 6, borderColor: '#0a0e17', borderWidth: 2 }
                }]
            };
            chart.setOption(option);
            
            // 使用命名函数避免重复注册
            const handleResize = () => {
                const newConfig = getResponsiveConfig();
                chart.setOption({
                    legend: { 
                        textStyle: { fontSize: newConfig.legendFontSize },
                        itemWidth: newConfig.isMobile ? 15 : 25,
                        itemHeight: newConfig.isMobile ? 10 : 14
                    },
                    series: [{
                        radius: newConfig.isMobile ? ['35%', '60%'] : ['40%', '65%'],
                        label: { fontSize: newConfig.fontSize }
                    }]
                });
                chart.resize();
            };
            window.addEventListener('resize', handleResize);
        }

        // ========== 2. 月度科室排名（前三名高亮）==========
        function initMonthlyDeptChart() {
            const chart = echarts.init(document.getElementById('monthlyDeptChart'));
            const monthName = currentMonth + '月';
            const monthData = dashboardData.monthly_data[currentYear]?.[monthName];
            if (!monthData) return;
            
            const depts = dashboardData.department_stats.departments;
            const values = monthData.departments;
            const config = getResponsiveConfig();
            
            // 找出前三名的索引
            const sorted = values.map((v, i) => ({ v, i })).sort((a, b) => b.v - a.v);
            const top3 = new Set(sorted.slice(0, 3).map(x => x.i));
            
            // 前三名颜色：金、银、铜
            const topColors = ['#FFD700', '#C0C0C0', '#CD7F32'];
            
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: config.gridLeft, right: config.gridRight, bottom: config.gridBottom, containLabel: true },
                xAxis: { type: 'category', data: depts, axisLabel: { color: '#c8d4e8', fontSize: config.axisLabelFontSize, rotate: config.isMobile ? 45 : 20, interval: 0 } },
                yAxis: { type: 'value', axisLabel: { color: '#8a9cc2', fontSize: config.axisLabelFontSize } },
                series: [{
                    type: 'bar',
                    data: values.map((v, i) => {
                        let color, borderRadius;
                        if (top3.has(i)) {
                            const rank = sorted.findIndex(x => x.i === i);
                            color = new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: topColors[rank] },
                                { offset: 1, color: '#1a2d4a' }
                            ]);
                            borderRadius = [8, 8, 0, 0];
                        } else {
                            color = new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#4a90d9' },
                                { offset: 1, color: '#1a2d4a' }
                            ]);
                            borderRadius = [6, 6, 0, 0];
                        }
                        return {
                            value: v,
                            itemStyle: { color, borderRadius, shadowBlur: top3.has(i) ? 15 : 0, shadowColor: top3.has(i) ? topColors[sorted.findIndex(x => x.i === i)] : 'transparent' }
                        };
                    }),
                    barWidth: '50%',
                    label: { show: true, position: 'top', color: '#fff', fontSize: config.fontSize, fontWeight: 'bold' },
                    animationDelay: (idx) => idx * 50,
                    animationEasing: 'elasticOut'
                }],
                animationDuration: 1500
            };
            chart.setOption(option);
            window.addEventListener('resize', () => {
                const newConfig = getResponsiveConfig();
                chart.setOption({
                    grid: { left: newConfig.gridLeft, right: newConfig.gridRight, bottom: newConfig.gridBottom, containLabel: true },
                    xAxis: { axisLabel: { fontSize: newConfig.axisLabelFontSize, rotate: newConfig.isMobile ? 45 : 20 } },
                    yAxis: { axisLabel: { fontSize: newConfig.axisLabelFontSize } },
                    series: [{ label: { fontSize: newConfig.fontSize } }]
                });
                chart.resize();
            });
        }

        // ========== 3. 全年科室排名（动画+前三高亮）==========
        function initYearlyDeptChart() {
            const chart = echarts.init(document.getElementById('yearlyDeptChart'));
            const deptData = dashboardData.department_stats;
            const depts = deptData.departments;
            const values = deptData.values;
            const config = getResponsiveConfig();
            
            // 找出前三名
            const sorted = values.map((v, i) => ({ v, i })).sort((a, b) => b.v - a.v);
            const top3 = new Set(sorted.slice(0, 3).map(x => x.i));
            const topColors = ['#FFD700', '#C0C0C0', '#CD7F32'];
            
            const option = {
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: config.gridLeft, right: config.gridRight, bottom: config.gridBottom, top: '8%', containLabel: true },
                xAxis: { type: 'category', data: depts, axisLabel: { color: '#c8d4e8', fontSize: config.axisLabelFontSize, rotate: config.isMobile ? 45 : 20, interval: 0 } },
                yAxis: { type: 'value', axisLabel: { color: '#8a9cc2', fontSize: config.axisLabelFontSize } },
                series: [{
                    type: 'bar',
                    data: values.map((v, i) => {
                        let color, shadowBlur, shadowColor;
                        if (top3.has(i)) {
                            const rank = sorted.findIndex(x => x.i === i);
                            color = new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: topColors[rank] },
                                { offset: 1, color: '#1a2d4a' }
                            ]);
                            shadowBlur = 20;
                            shadowColor = topColors[rank];
                        } else {
                            color = new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#7eb8da' },
                                { offset: 1, color: '#1a2d4a' }
                            ]);
                            shadowBlur = 0;
                            shadowColor = 'transparent';
                        }
                        return {
                            value: v,
                            itemStyle: { color, borderRadius: [8, 8, 0, 0], shadowBlur, shadowColor }
                        };
                    }),
                    barWidth: '50%',
                    label: { 
                        show: true, 
                        position: 'top', 
                        color: '#fff', 
                        fontSize: config.fontSize, 
                        fontWeight: 'bold',
                        formatter: function(params) {
                            const rank = sorted.findIndex(x => x.i === params.dataIndex);
                            if (rank < 3) {
                                return ['🥇', '🥈', '🥉'][rank] + ' ' + params.value;
                            }
                            return params.value;
                        }
                    },
                    animationDuration: 2000,
                    animationDelay: (idx) => idx * 100,
                    animationEasing: 'elasticOut'
                }]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => {
                const newConfig = getResponsiveConfig();
                chart.setOption({
                    grid: { left: newConfig.gridLeft, right: newConfig.gridRight, bottom: newConfig.gridBottom, top: '8%', containLabel: true },
                    xAxis: { axisLabel: { fontSize: newConfig.axisLabelFontSize, rotate: newConfig.isMobile ? 45 : 20 } },
                    yAxis: { axisLabel: { fontSize: newConfig.axisLabelFontSize } },
                    series: [{ label: { fontSize: newConfig.fontSize } }]
                });
                chart.resize();
            });
            
            // 动态闪烁效果（页面可见时运行）
            let highlight = true;
            let blinkInterval = setInterval(() => {
                if (document.hidden) return;  // 页面不可见时跳过
                chart.setOption({
                    series: [{
                        data: values.map((v, i) => {
                            let color, shadowBlur, shadowColor;
                            if (top3.has(i)) {
                                const rank = sorted.findIndex(x => x.i === i);
                                color = new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: topColors[rank] },
                                    { offset: 1, color: '#1a2d4a' }
                                ]);
                                shadowBlur = highlight ? 25 : 15;
                                shadowColor = topColors[rank];
                            } else {
                                color = new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#7eb8da' },
                                    { offset: 1, color: '#1a2d4a' }
                                ]);
                                shadowBlur = 0;
                                shadowColor = 'transparent';
                            }
                            return {
                                value: v,
                                itemStyle: { color, borderRadius: [8, 8, 0, 0], shadowBlur, shadowColor }
                            };
                        })
                    }]
                });
                highlight = !highlight;
            }, 1500);
            
            // 页面卸载时清除定时器，避免内存泄漏
            window.addEventListener('beforeunload', () => clearInterval(blinkInterval));
        }

        // ========== 4. 月度趋势对比 ==========
        function initMonthlyChart() {
            const chart = echarts.init(document.getElementById('monthlyChart'));
            const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
            const data2025 = months.map(m => dashboardData.monthly_data['2025']?.[m]?.total || 0);
            const data2026 = months.map(m => dashboardData.monthly_data['2026']?.[m]?.total || 0);
            const config = getResponsiveConfig();
            
            const option = {
                tooltip: { trigger: 'axis', textStyle: { fontSize: config.fontSize } },
                legend: { data: ['2025年', '2026年'], textStyle: { color: '#8a9cc2', fontSize: config.legendFontSize } },
                grid: { left: config.gridLeft, right: config.gridRight, bottom: config.gridBottom, containLabel: true },
                xAxis: { type: 'category', data: months, axisLabel: { color: '#c8d4e8', fontSize: config.axisLabelFontSize } },
                yAxis: { type: 'value', axisLabel: { color: '#8a9cc2', fontSize: config.axisLabelFontSize } },
                series: [
                    { 
                        name: '2025年', 
                        type: 'line', 
                        data: data2025, 
                        smooth: true, 
                        lineStyle: { color: '#64748b', width: 3 }, 
                        itemStyle: { color: '#64748b' },
                        symbol: 'circle',
                        symbolSize: 8
                    },
                    { 
                        name: '2026年', 
                        type: 'line', 
                        data: data2026, 
                        smooth: true, 
                        lineStyle: { color: '#4a90d9', width: 3 }, 
                        itemStyle: { color: '#4a90d9' },
                        symbol: 'circle',
                        symbolSize: 8,
                        areaStyle: { 
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(74,144,217,0.3)' }, 
                                { offset: 1, color: 'rgba(74,144,217,0)' }
                            ]) 
                        } 
                    }
                ]
            };
            chart.setOption(option);
            window.addEventListener('resize', () => {
                const newConfig = getResponsiveConfig();
                chart.setOption({
                    tooltip: { textStyle: { fontSize: newConfig.fontSize } },
                    legend: { textStyle: { fontSize: newConfig.legendFontSize } },
                    grid: { left: newConfig.gridLeft, right: newConfig.gridRight, bottom: newConfig.gridBottom, containLabel: true },
                    xAxis: { axisLabel: { fontSize: newConfig.axisLabelFontSize } },
                    yAxis: { axisLabel: { fontSize: newConfig.axisLabelFontSize } }
                });
                chart.resize();
            });
        }

        // ========== 5. 科室同比 ==========
        function initDeptYoyChart() {
            const chart = echarts.init(document.getElementById('deptYoyChart'));
            const monthName = currentMonth + '月';
            const yoyValues = dashboardData.department_yoy?.[monthName] || [];
            const depts = dashboardData.department_stats?.departments || [];
            const config = getResponsiveConfig();
            
            // 找出增长前三和下降前三
            const sorted = yoyValues.map((v, i) => ({ v, i })).sort((a, b) => b.v - a.v);
            const topGrowth = new Set(sorted.filter(x => x.v > 0).slice(0, 3).map(x => x.i));
            const topDrop = new Set(sorted.filter(x => x.v < 0).slice(-3).map(x => x.i));
            
            const option = {
                tooltip: { 
                    trigger: 'axis', 
                    axisPointer: { type: 'shadow' },
                    textStyle: { fontSize: config.fontSize },
                    formatter: function(params) {
                        const d = params[0];
                        return d.name + '<br/>同比: ' + (d.value >= 0 ? '+' : '') + d.value + '篇';
                    }
                },
                grid: { left: config.gridLeft, right: config.gridRight, bottom: config.gridBottom, containLabel: true },
                xAxis: { type: 'category', data: depts, axisLabel: { color: '#c8d4e8', fontSize: config.isMobile ? 9 : config.axisLabelFontSize, rotate: config.isMobile ? 45 : 30, interval: 0 } },
                yAxis: { type: 'value', axisLabel: { color: '#8a9cc2', fontSize: config.axisLabelFontSize } },
                series: [{
                    type: 'bar',
                    data: yoyValues.map((v, i) => {
                        let color = v >= 0 ? '#22c55e' : '#ef4444';
                        let shadowBlur = 0;
                        if (topGrowth.has(i)) {
                            shadowBlur = 15;
                        } else if (topDrop.has(i)) {
                            shadowBlur = 15;
                        }
                        return { 
                            value: v, 
                            itemStyle: { color, borderRadius: [6, 6, 0, 0], shadowBlur, shadowColor: color } 
                        };
                    }),
                    barWidth: '50%',
                    label: { show: true, position: 'top', color: '#fff', fontSize: config.fontSize - 1, fontWeight: 'bold', formatter: '{c}' },
                    animationDelay: (idx) => idx * 50,
                    animationEasing: 'elasticOut'
                }],
                animationDuration: 1500
            };
            chart.setOption(option);
            window.addEventListener('resize', () => {
                const newConfig = getResponsiveConfig();
                chart.setOption({
                    tooltip: { textStyle: { fontSize: newConfig.fontSize } },
                    grid: { left: newConfig.gridLeft, right: newConfig.gridRight, bottom: newConfig.gridBottom, containLabel: true },
                    xAxis: { axisLabel: { fontSize: newConfig.isMobile ? 9 : newConfig.axisLabelFontSize, rotate: newConfig.isMobile ? 45 : 30 } },
                    yAxis: { axisLabel: { fontSize: newConfig.axisLabelFontSize } },
                    series: [{ label: { fontSize: newConfig.fontSize - 1 } }]
                });
                chart.resize();
            });
        }

        // ========== 更新指标卡片 ==========
        function updateMetrics() {
            document.getElementById('totalArticles').textContent = dashboardData.summary.total_articles;
            document.getElementById('monthlyAvg').textContent = dashboardData.summary.monthly_avg.toFixed(2);
            
            const monthName = currentMonth + '月';
            const monthData = dashboardData.monthly_data[currentYear]?.[monthName];
            document.getElementById('currentMonthArticles').textContent = monthData ? monthData.total : '-';
            
            const yoy = dashboardData.monthly_yoy_totals?.[monthName] || dashboardData.year_over_year[monthName]?.total || 0;
            const yoyElem = document.getElementById('yearOverYear');
            yoyElem.textContent = (yoy >= 0 ? '+' : '') + yoy;
            yoyElem.style.color = yoy >= 0 ? '#22c55e' : '#ef4444';
        }

        // ========== 更新看板 ==========
        function updateDashboard() {
            currentYear = parseInt(document.getElementById('yearSelect').value);
            currentMonth = parseInt(document.getElementById('monthSelect').value);
            
            document.getElementById('monthlyDeptTitle').textContent = '🏆 ' + currentMonth + '月科室稿件排名';
            document.getElementById('deptYoyTitle').textContent = '📈 ' + currentMonth + '月科室同比';
            
            updateMetrics();
            initMonthlyDeptChart();
            initDeptYoyChart();
        }

        // ========== 页面加载完成后初始化 ==========
        window.addEventListener('DOMContentLoaded', () => {
            generateMonthOptions(); // 动态生成月份选项（会更新currentMonth）
            initCharts();
            updateDashboard(); // 确保标题与当前月份一致
            loadPhotos();
            setInterval(() => {
                document.getElementById('datetime').textContent = new Date().toLocaleString('zh-CN');
            }, 1000);
        });

        // ========== 照片轮播 ==========
        let photos = [];
        let currentPhotoIndex = 0;
        let photoTimer = null;

        function loadPhotos() {
            fetch('photos.json?t=' + Date.now(), { cache: 'no-store' })
                .then(r => r.json())
                .then(data => {
                    photos = data.photos || [];
                    if (!photos.length) return;
                    const carousel = document.getElementById('photoCarousel');
                    const dots = document.getElementById('carouselDots');

                    photos.forEach((p, i) => {
                        const img = document.createElement('img');
                        img.src = p.path;
                        img.alt = p.title;
                        if (i === 0) img.classList.add('active');
                        carousel.insertBefore(img, dots);
                    });

                    photos.forEach((p, i) => {
                        const dot = document.createElement('span');
                        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                        dot.onclick = () => goToPhoto(i);
                        dots.appendChild(dot);
                    });

                    startPhotoTimer();
                })
                .catch(e => console.error('加载照片失败:', e));
        }

        function updatePhotos() {
            if (!photos.length) return;
            const imgs = document.querySelectorAll('#photoCarousel img');
            const dots = document.querySelectorAll('.carousel-dot');
            imgs.forEach((img, i) => img.classList.toggle('active', i === currentPhotoIndex));
            dots.forEach((dot, i) => dot.classList.toggle('active', i === currentPhotoIndex));
        }

        function goToPhoto(index) {
            currentPhotoIndex = index;
            updatePhotos();
            resetPhotoTimer();
        }

        function nextPhoto() {
            if (!photos.length) return;
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            updatePhotos();
            resetPhotoTimer();
        }

        function prevPhoto() {
            if (!photos.length) return;
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            updatePhotos();
            resetPhotoTimer();
        }

        function startPhotoTimer() {
            photoTimer = setInterval(nextPhoto, 5000);
        }

        function resetPhotoTimer() {
            clearInterval(photoTimer);
            startPhotoTimer();
        }

        // 悬停暂停，离开恢复
        document.addEventListener('DOMContentLoaded', () => {
            const carousel = document.getElementById('photoCarousel');
            if (carousel) {
                carousel.addEventListener('mouseenter', () => clearInterval(photoTimer));
                carousel.addEventListener('mouseleave', startPhotoTimer);
            }
        });

        // ========== 动态生成月份选项 ==========
        function generateMonthOptions() {
            const monthSelect = document.getElementById('monthSelect');
            const yearSelect = document.getElementById('yearSelect');
            const selectedYear = yearSelect.value;
            
            // 清空现有选项
            monthSelect.innerHTML = '';
            
            // 从数据中获取该年所有月份
            const yearData = dashboardData.monthly_data[selectedYear];
            if (!yearData) return;
            
            const months = Object.keys(yearData).sort((a, b) => parseInt(a) - parseInt(b));
            
            // 找到最后一个有数据的月份
            let lastMonthWithData = 1;
            months.forEach(m => {
                const monthNum = parseInt(m);
                const total = yearData[m]?.total || 0;
                if (total > 0) lastMonthWithData = monthNum;
            });
            
            // 生成选项
            months.forEach(m => {
                const monthNum = parseInt(m);
                const option = document.createElement('option');
                option.value = monthNum;
                option.textContent = monthNum + '月';
                // 默认选中最后一个有数据的月份
                if (monthNum === lastMonthWithData) option.selected = true;
                monthSelect.appendChild(option);
            });
            
            // 更新当前月份
            currentMonth = lastMonthWithData;
        }

        // ========== 手动刷新功能 ==========
        function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('loading');
            btn.querySelector('span:last-child').textContent = '刷新中...';
            
            // 刷新页面（强制重新加载）
            setTimeout(() => {
                location.reload();
            }, 300);
        }
    </script>
</body>
</html>
